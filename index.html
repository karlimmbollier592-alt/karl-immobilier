<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acheteurs Immobiliers Quebec | Site en construction</title>
    <meta name="description" content="Notre site est presentement en construction. Revenez bientot pour decouvrir notre service d'achat immobilier au Quebec.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); color: #fff; -webkit-font-smoothing: antialiased; }
        .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .badge { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 999px; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; color: #c9a961; }
        h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; max-width: 900px; }
        h1 .accent { color: #c9a961; }
        p.lead { font-size: clamp(1rem, 2vw, 1.25rem); font-weight: 400; opacity: 0.75; max-width: 600px; line-height: 1.6; margin-bottom: 3rem; }
        .contact a { color: #0a0a0a; text-decoration: none; padding: 0.875rem 2rem; background: #c9a961; border-radius: 4px; font-weight: 700; font-size: 0.875rem; letter-spacing: 0.05em; text-transform: uppercase; display: inline-block; transition: opacity 0.2s ease; }
        .contact a:hover { opacity: 0.85; }
        footer { position: absolute; bottom: 1.5rem; left: 0; right: 0; text-align: center; font-size: 0.75rem; opacity: 0.4; }
    </style>
</head>
<body>
    <main class="wrap">
        <span class="badge">Site en construction</span>
        <h1>Acheteurs Immobiliers <span class="accent">Quebec</span></h1>
        <p class="lead">Nous travaillons sur une nouvelle experience. Pour toute question concernant la vente rapide de votre propriete, contactez-nous directement.</p>
        <div class="contact"><a href="mailto:info@acheteursimmobiliersquebec.com">Nous ecrire</a></div>
    </main>
    <footer>&copy; 2026 Acheteurs Immobiliers Quebec</footer>
</body>
</html>
