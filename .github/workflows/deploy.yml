name: Deploy to WHC via SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy coming-soon page to WHC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare coming-soon deploy
        run: |
          mkdir -p deploy-staging/assets/images
          cp index.html deploy-staging/index.html
          cp assets/images/AIQ-TEXTE-BLANC_f4b2300d.png deploy-staging/assets/images/

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /
          local-dir: deploy-staging/
          dangerous-clean-slate: true
