<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acheteurs Immobiliers Quebec</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', system-ui, sans-serif;
            background: #1f2445;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        .logo {
            width: 280px;
            margin-bottom: 2.5rem;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: #2848dd;
            margin: 0 auto 2rem;
            border-radius: 2px;
        }
        p {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 1.6;
            color: #d7d8d8;
        }
        .phone {
            margin-top: 2rem;
            font-size: 1.1rem;
            color: #deefff;
        }
        .phone a {
            color: #deefff;
            text-decoration: none;
        }
        .phone a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/images/AIQ-TEXTE-BLANC_f4b2300d.png" alt="Acheteurs Immobiliers Quebec" class="logo">

        <p>Notre site sera disponible sous peu.</p>
